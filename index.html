<script type="module">
import React from 'https://esm.sh/react@18.3.1';

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://esm.sh/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';
const html = htm.bind(React.createElement);

// ---- Live integration config (all public-safe values; never put a Stripe SECRET key here) ----
const GOOGLE_CLIENT_ID = '1087731665818-0cjd9u6q3soi16c7g602gpnea6vhj9b0.apps.googleusercontent.com';
const STRIPE_PAYMENT_LINK = 'https://buy.stripe.com/test_14A4gz4W0gN92LeeUj9bO04'; // TEST mode link — swap for the Live link before real launch

// Parse an inline CSS string into a React style object so the design's
// original inline styles can be carried over almost verbatim.
function s(css){
  const o = {};
  if(!css) return o;
  css.split(';').forEach(rule=>{
    const i = rule.indexOf(':');
    if(i < 0) return;
    let k = rule.slice(0, i).trim();
    const v = rule.slice(i + 1).trim();
    if(!k || !v) return;
    k = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    o[k] = v;
  });
  return o;
}

class App extends React.Component {
  constructor(props){
    super(props);
    let user = null, paid = false, gid = '', spk = '';
    try{
      user = JSON.parse(localStorage.getItem('bp_user') || 'null');
      paid = localStorage.getItem('bp_paid') === '1';
      gid  = localStorage.getItem('bp_gid') || GOOGLE_CLIENT_ID;
      spk  = localStorage.getItem('bp_spk') || '';
      // Returning from a successful Stripe payment? Stripe appends ?session_id=... (or we use ?paid=1).
      const q = new URLSearchParams(location.search);
      if(q.get('paid') === '1' || q.get('session_id')){
        paid = true;
        localStorage.setItem('bp_paid', '1');
        history.replaceState({}, '', location.pathname); // clean the URL so a refresh doesn't re-trigger
      }
    }catch(e){}
    this.state = {
      screen: user ? 'dashboard' : 'signin',
      user, paid, googleClientId: gid, stripePk: spk,
      email: '', dragOver: false, showPaywall: false, paying: false,
      showConfig: false, calStatus: 'idle',
      reports: this.seedReports(),
      parsed: {},      // { reportId: { markerName: value } } — values parsed from uploaded reports
      parseMsg: '',    // transient status line shown on the upload screen
    };
  }

  seedReports(){
    return [
      {id:'r1', label:'Full metabolic + lipid panel', date:'2025-06-10', source:'sample'},
      {id:'r2', label:'Follow-up lipid + vitamin panel', date:'2025-12-12', source:'sample'},
      {id:'r3', label:'Annual comprehensive panel', date:'2026-06-10', source:'sample'},
    ];
  }

  // Real Google sign-in from the branded button. Uses the OAuth token model (same as the
  // calendar flow), then reads the profile from the userinfo endpoint. Falls back to a demo
  // login only when no Client ID is configured or the Google script hasn't loaded.
  googleSignIn = () => {
    const id = this.state.googleClientId;
    const g = window.google;
    if(id && g && g.accounts && g.accounts.oauth2){
      try{
        const tc = g.accounts.oauth2.initTokenClient({
          client_id: id,
          scope: 'openid email profile',
          callback: async (tok) => {
            if(!tok || !tok.access_token){ return; }
            try{
              const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {headers:{Authorization:'Bearer '+tok.access_token}});
              const p = await r.json();
              this.login({email:p.email, name:p.name, picture:p.picture});
            }catch(e){ this.demoGoogle(); }
          },
        });
        tc.requestAccessToken();
        return;
      }catch(e){}
    }
    this.demoGoogle();
  }

  login = (user) => { try{localStorage.setItem('bp_user', JSON.stringify(user));}catch(e){}; this.setState({user, screen:'upload'}); }
  demoGoogle = () => this.login({email:'ajay@gmail.com', name:'Ajay Varadharajan'});
  emailSignin = () => { const e = (this.state.email || '').trim(); if(!e) return; this.login({email:e, name:e.split('@')[0]}); }
  onEmail = (ev) => this.setState({email: ev.target.value});
  signOut = () => { try{localStorage.removeItem('bp_user');}catch(e){}; this._gInit = false; this.setState({user:null, screen:'signin'}); }

  goDashboard = () => this.setState({screen:'dashboard'});
  goUpload = () => this.setState({screen:'upload'});

  onDragOver = (e) => { e.preventDefault(); if(!this.state.dragOver) this.setState({dragOver:true}); }
  onDragLeave = (e) => { e.preventDefault(); this.setState({dragOver:false}); }
  onDrop = (e) => { e.preventDefault(); this.setState({dragOver:false}); this.addFiles(e.dataTransfer.files); }
  onFiles = (e) => this.addFiles(e.target.files);
  async addFiles(fileList){
    const files = Array.from(fileList || []);
    if(!files.length) return;
    const stamp = Date.now();
    const add = files.map((f, i) => {
      const d = f.lastModified ? new Date(f.lastModified) : new Date();
      return {file:f, id:'u'+stamp+i, label:f.name.replace(/\.[^.]+$/,''), date:d.toISOString().slice(0,10), source:'upload'};
    });
    // Add the report entries immediately (without the raw File handle).
    this.setState(st => ({reports:[...st.reports, ...add.map(({file, ...r}) => r)].sort((a,b)=>a.date.localeCompare(b.date))}));
    // Parse PDFs in the background; images are listed but not parsed (no OCR).
    for(const r of add){
      if(!/\.pdf$/i.test(r.file.name)){
        this.setState({parseMsg:r.label+' added — image reports aren’t read automatically yet, showing sample values.'});
        continue;
      }
      this.setState({parseMsg:'Reading '+r.label+'…'});
      try{
        const text = await this.extractPdfText(r.file);
        const vals = this.parseMarkers(text);
        const n = Object.keys(vals).length;
        if(n){ this.setState(st => ({parsed:{...st.parsed, [r.id]:vals}, parseMsg:'Read '+n+' markers from '+r.label+'.'})); }
        else { this.setState({parseMsg:'No recognizable markers found in '+r.label+' — showing sample values.'}); }
      }catch(e){ this.setState({parseMsg:'Couldn’t read '+r.label+' — showing sample values.'}); }
    }
  }

  // ---------- report parsing ----------
  async extractPdfText(file){
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let text = '';
    for(let p = 1; p <= pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      // Join items on a line by their y position so "Name value unit range" stays together.
      const rows = {};
      content.items.forEach(it => {
        const y = it.transform ? Math.round(it.transform[5]) : 0;
        (rows[y] = rows[y] || []).push(it.str);
      });
      Object.keys(rows).sort((a,b)=>b-a).forEach(y => { text += rows[y].join(' ') + '\n'; });
    }
    return text;
  }

  aliases(){
    return {
      'HbA1c':['Glycated Haemoglobin','Glycated Hemoglobin','HbA1C','A1c','Hb A1c'],
      'Fasting glucose':['Glucose Fasting','Fasting Blood Sugar','FBS'],
      'Post-prandial glucose':['Post Prandial Glucose','PP Glucose','PPBS'],
      'Vitamin D':['25-OH Vitamin D','25 Hydroxy Vitamin D','Vitamin D (25-OH)','25-Hydroxyvitamin D'],
      'Vitamin B12':['Vitamin B-12','B12','Cyanocobalamin'],
      'LDL cholesterol':['LDL Cholesterol','LDL-C','LDL'],
      'HDL cholesterol':['HDL Cholesterol','HDL-C','HDL'],
      'Non-HDL cholesterol':['Non HDL Cholesterol','Non-HDL-C'],
      'Total cholesterol':['Cholesterol Total','Cholesterol, Total'],
      'SGPT (ALT)':['SGPT','ALT','Alanine'],
      'SGOT (AST)':['SGOT','AST','Aspartate'],
      'Bilirubin total':['Total Bilirubin','Bilirubin, Total'],
      'Bilirubin direct':['Direct Bilirubin','Bilirubin, Direct'],
      'Urea nitrogen (BUN)':['Blood Urea Nitrogen','BUN','Urea Nitrogen'],
      'Haemoglobin':['Hemoglobin','Hb'],
      'RBC count':['RBC','Red Blood Cell','Total RBC'],
      'WBC count':['WBC','White Blood Cell','Total WBC','Total Leucocyte'],
      'IgE total':['Total IgE','Immunoglobulin E','Serum IgE'],
      'TSH':['Thyroid Stimulating Hormone'],
      'Free T3':['FT3','Free Tri-iodothyronine'],
      'Free T4':['FT4','Free Thyroxine'],
      'eGFR':['GFR','Estimated GFR'],
      'hsCRP':['hs-CRP','High Sensitivity CRP','CRP High Sensitivity'],
      'Total PSA':['PSA','Prostate Specific Antigen'],
      'Serum iron':['Iron','Iron Serum'],
      'HCV antibody':['Anti HCV','HCV Ab','Anti-HCV'],
      'HBsAg':['Hepatitis B Surface Antigen','HBs Ag'],
      'Urine routine':['Urine Routine','Urine Analysis','Urinalysis'],
    };
  }

  parseMarkers(text){
    const norm = (text || '').replace(/ /g, ' ').replace(/[ \t]+/g, ' ');
    const lines = norm.split(/\n+/).map(l => l.trim()).filter(Boolean);
    const cat = this.data();
    const aliasMap = this.aliases();
    // A standalone number: not glued to a letter/digit (so "6.1" matches but the "1" in "A1c" does not). Handles "7,200".
    const numRe = /(?<![A-Za-z\d.])(?:\d{1,3}(?:,\d{3})+(?:\.\d+)?|\d+(?:\.\d+)?)(?![A-Za-z\d])/g;
    const catRe = /non[-\s]?reactive|not[-\s]?detected|reactive|negative|positive|abnormal|detected|normal/i;
    const out = {};
    for(const d of cat){
      const names = [d.name, ...(aliasMap[d.name] || [])];
      // Best candidate line across all aliases: prefer the match closest to the line start
      // (lab tables put the test name first), then the longest (most specific) alias.
      let best = null;
      for(const nm of names){
        const esc = nm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/\s+/g, '\\s+');
        const re = new RegExp('(?<![A-Za-z0-9])' + esc + '(?![A-Za-z0-9])', 'i');
        for(const line of lines){
          const m = re.exec(line);
          if(!m) continue;
          const cand = {index:m.index, len:m[0].length, after:line.slice(m.index + m[0].length), line};
          if(best === null || cand.index < best.index || (cand.index === best.index && cand.len > best.len)) best = cand;
        }
      }
      if(!best) continue;
      if(d.cat){
        const c = catRe.exec(best.after) || catRe.exec(best.line);
        if(c) out[d.name] = c[0].replace(/\s+/g, '-').toLowerCase().replace(/^\w/, ch => ch.toUpperCase());
        continue;
      }
      numRe.lastIndex = 0;
      const mm = numRe.exec(best.after);
      if(mm){ const v = parseFloat(mm[0].replace(/,/g, '')); if(!Number.isNaN(v)) out[d.name] = v; }
    }
    return out;
  }

  // Heuristic status for a parsed value (sample rows keep their curated status).
  classify(d, val){
    if(d.cat) return /reactive|positive|abnormal|detected/i.test(String(val)) && !/non-?reactive|not/i.test(String(val)) ? 'out' : 'good';
    const {low, high, type} = d;
    let inRange, dist, span;
    if(type === 'min'){ span = Math.max(high - low, low * 0.2) || 1; inRange = val >= low; dist = inRange ? 0 : (low - val); }
    else if(type === 'max'){ span = high || 1; inRange = val <= high; dist = inRange ? 0 : (val - high); }
    else { span = (high - low) || 1; inRange = val >= low && val <= high; dist = inRange ? 0 : (val < low ? low - val : val - high); }
    if(inRange) return 'good';
    return (dist / span <= 0.15) ? 'watch' : 'out';
  }

  // The metric list for the active (latest parsed) report, or the pure sample set.
  activeData(){
    const withParsed = this.state.reports.filter(r => this.state.parsed[r.id]);
    if(!withParsed.length) return {rows: this.data(), active: null, parsedCount: 0};
    const active = [...withParsed].sort((a,b) => a.date.localeCompare(b.date)).slice(-1)[0];
    const pv = this.state.parsed[active.id];
    let parsedCount = 0;
    const rows = this.data().map(d => {
      const v = pv[d.name];
      if(v == null) return d;
      parsedCount++;
      return {...d, val: v, status: this.classify(d, v), _real: true};
    });
    return {rows, active, parsedCount};
  }

  openPaywall = () => this.setState({showPaywall:true});
  closePaywall = () => this.setState({showPaywall:false, paying:false});
  stop = (e) => e.stopPropagation();
  payNow = () => {
    if(this.state.paying) return;
    this.setState({paying:true});
    if(STRIPE_PAYMENT_LINK){
      // Real payment: hand off to Stripe-hosted checkout. On success Stripe redirects back
      // to the app's success URL, and the constructor unlocks from the returned session param.
      window.location.href = STRIPE_PAYMENT_LINK;
      return;
    }
    // Demo fallback (no Payment Link configured yet): simulate an unlock.
    setTimeout(() => { try{localStorage.setItem('bp_paid','1');}catch(e){}; this.setState({paid:true, paying:false, showPaywall:false}); }, 1400);
  }

  openConfig = () => this.setState({showConfig:true});
  closeConfig = () => this.setState({showConfig:false});
  onGoogleId = (e) => this.setState({googleClientId:e.target.value});
  onStripePk = (e) => this.setState({stripePk:e.target.value});
  saveConfig = () => { try{localStorage.setItem('bp_gid',this.state.googleClientId);localStorage.setItem('bp_spk',this.state.stripePk);}catch(e){}; this._gInit = false; this.setState({showConfig:false}); }

  // ---------- calendar ----------
  calendarTasks(){
    const defs = [
      {t:'Start Vitamin D correction course', d:'Ask your doctor about a weekly high-dose sachet for 6–8 weeks, then a daily maintenance dose. Get 15–20 min of midday sun on most days.', off:1},
      {t:'Book a doctor visit about raised IgE (877)', d:'Discuss the high IgE. If you have sneezing, itching or wheeze, ask about a specific allergen panel.', off:3},
      {t:'Begin heart-health habits (HbA1c + LDL)', d:'150 min/week of activity, trim refined carbs and sugary drinks, lean on fibre, nuts and unsaturated fats.', off:6},
      {t:'Recheck bloodwork (Vitamin D + full panel)', d:'Re-test in ~12 weeks as the report recommends, to confirm Vitamin D is climbing and markers are improving.', off:84},
    ];
    const pad = n => String(n).padStart(2,'0');
    const iso = d => d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes())+':00';
    const compact = d => d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00';
    return defs.map(def => {
      const start = new Date(); start.setDate(start.getDate()+def.off); start.setHours(9,0,0,0);
      const end = new Date(start.getTime()+30*60000);
      const summary = 'Arogya: '+def.t;
      const description = def.d+'\n\n— from your Arogya action plan';
      return {summary, description, startIso:iso(start), endIso:iso(end),
        templateUrl:'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(summary)+'&details='+encodeURIComponent(description)+'&dates='+compact(start)+'/'+compact(end)};
    });
  }
  sendToCalendar = () => {
    if(this.state.calStatus === 'working') return;
    const tasks = this.calendarTasks();
    const id = this.state.googleClientId;
    const g = window.google;
    if(id && g && g.accounts && g.accounts.oauth2){
      this.setState({calStatus:'working'});
      try{
        const tc = g.accounts.oauth2.initTokenClient({
          client_id: id,
          scope: 'https://www.googleapis.com/auth/calendar.events',
          callback: async (tok) => {
            if(!tok || !tok.access_token){ this.calFallback(tasks); return; }
            try{ for(const t of tasks){ await this.insertEvent(tok.access_token, t); } this.setState({calStatus:'done'}); }
            catch(e){ this.calFallback(tasks); }
          },
        });
        tc.requestAccessToken();
      }catch(e){ this.calFallback(tasks); }
    } else {
      this.calFallback(tasks);
    }
  }
  insertEvent(token, t){
    const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone) || 'UTC';
    const body = { summary:t.summary, description:t.description,
      start:{dateTime:t.startIso, timeZone:tz}, end:{dateTime:t.endIso, timeZone:tz},
      reminders:{useDefault:false, overrides:[{method:'popup',minutes:60},{method:'email',minutes:1440}]} };
    return fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method:'POST', headers:{'Authorization':'Bearer '+token, 'Content-Type':'application/json'}, body:JSON.stringify(body)
    }).then(r => { if(!r.ok) throw new Error('cal'); return r.json(); });
  }
  calFallback(tasks){
    try{ tasks.forEach((t, i) => { setTimeout(() => window.open(t.templateUrl, '_blank'), i*350); }); }catch(e){}
    this.setState({calStatus:'done'});
  }

  // ---------- data helpers ----------
  geometry(d){
    let sMin, sMax;
    if(d.type === 'range'){ const pad = (d.high-d.low)*0.55 || 1; sMin = Math.min(d.low-pad, d.val-pad*0.4); sMax = Math.max(d.high+pad, d.val+pad*0.4); }
    else if(d.type === 'max'){ sMin = 0; sMax = Math.max(d.high*1.35, d.val*1.12); }
    else{ sMin = Math.min(d.low*0.35, d.val*0.85); sMax = Math.max(d.high, d.val)*1.05; }
    const pct = v => Math.max(0, Math.min(100, ((v-sMin)/(sMax-sMin))*100));
    let gL, gR;
    if(d.type === 'min'){ gL = pct(d.low); gR = 100; }
    else if(d.type === 'max'){ gL = 0; gR = pct(d.high); }
    else{ gL = pct(d.low); gR = pct(d.high); }
    return {gL, gR, mark:pct(d.val), sMin, sMax};
  }
  fmt(n){ return (typeof n === 'number') ? (Number.isInteger(n) ? n : n.toLocaleString(undefined, {maximumFractionDigits:2})) : n; }
  col(st){ return st === 'out' ? 'var(--out)' : st === 'watch' ? 'var(--watch)' : 'var(--good)'; }
  word(st){ return st === 'out' ? 'out of range' : st === 'watch' ? 'borderline' : 'in range'; }

  enrich(d, locked){
    const g = this.geometry(d);
    return {
      name:d.name, unit:d.unit || '', col:this.col(d.status), word:this.word(d.status),
      valDisplay: d.cat ? d.val : this.fmt(d.val),
      valColor: d.status === 'good' ? 'var(--ink)' : this.col(d.status),
      valFilter: (locked && d.status !== 'good') ? 'blur(6px)' : 'none',
      dotFilter: (locked && d.status !== 'good') ? 'blur(5px)' : 'none',
      showBar: !d.cat,
      gL:g.gL, gW:g.gR-g.gL, mark:g.mark,
      loLab: d.type === 'max' ? '0' : String(this.fmt(g.sMin)),
      midLab: d.type === 'min' ? `healthy ≥ ${this.fmt(d.low)}` : d.type === 'max' ? `healthy ≤ ${this.fmt(d.high)}` : `healthy ${this.fmt(d.low)}–${this.fmt(d.high)}`,
      hiLab: String(this.fmt(g.sMax)),
      what:d.what,
    };
  }

  buildTrends(){
    const hist = [
      {key:'Vitamin D', unit:'ng/mL', vals:[9.2,11.5,13.86], dates:['2025-06-10','2025-12-12','2026-06-10'], better:'up', note:'Still low, but climbing steadily. Keep the correction course going.'},
      {key:'HbA1c', unit:'%', vals:[5.9,5.8,5.6], dates:['2025-06-10','2025-12-12','2026-06-10'], better:'down', note:'Trending down toward the middle of normal — habits are working.'},
      {key:'LDL cholesterol', unit:'mg/dL', vals:[138,126,113.7], dates:['2025-06-10','2025-12-12','2026-06-10'], better:'down', note:'Dropping nicely, now just past optimal. Almost there.'},
      {key:'IgE total', unit:'IU/mL', vals:[910,890,877], dates:['2025-06-10','2025-12-12','2026-06-10'], better:'down', note:'Barely moving and still high — worth an allergy work-up.'},
    ];
    // Prefer real parsed history: values for this marker across reports, in date order.
    const reps = [...this.state.reports].sort((a,b) => a.date.localeCompare(b.date));
    const realSeries = key => {
      const pts = [];
      reps.forEach(r => { const pv = this.state.parsed[r.id]; if(pv && pv[key] != null) pts.push({v:pv[key], date:r.date}); });
      return pts.length >= 2 ? pts : null;
    };
    const fmtD = str => { const [y,m] = str.split('-'); return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+" '"+y.slice(2); };
    const W = 260, H = 64, PX = 8;
    return hist.map(h => {
      const real = realSeries(h.key);
      const series = real || h.vals.map((v, i) => ({v, date:h.dates[i]}));
      const vals = series.map(p => p.v);
      const dates = series.map(p => p.date);
      const min = Math.min(...vals), max = Math.max(...vals), span = (max-min) || 1;
      const n = vals.length;
      const pts = vals.map((v, i) => {
        const x = PX + (n===1 ? 0.5 : i/(n-1))*(W-PX*2);
        const y = 8 + (1-(v-min)/span)*(H-16);
        return {x:+x.toFixed(1), y:+y.toFixed(1), v};
      });
      const first = vals[0], last = vals[vals.length-1];
      const improved = h.better === 'up' ? last>first : last<first;
      const pctChange = first ? Math.round(((last-first)/first)*100) : 0;
      return {
        name:h.key, unit:h.unit,
        poly: pts.map(p => `${p.x},${p.y}`).join(' '),
        dots: pts.map(p => ({x:p.x, y:p.y, fill: improved ? 'var(--good)' : 'var(--watch)'})),
        dirColor: improved ? 'var(--good)' : 'var(--watch)',
        deltaLabel: (pctChange>0 ? '+' : '')+pctChange+'%',
        firstDate: fmtD(dates[0]), lastDate: fmtD(dates[dates.length-1]),
        takeaway: real ? 'From your uploaded reports.' : h.note,
      };
    });
  }

      'Thyroid':{icon:'🦋',intro:'The gland that sets your metabolism and energy.'},

      'Minerals & electrolytes':{icon:'🧂',intro:'The salts and minerals that keep everything ticking.'},

    const reason = {

      'MPV':'Platelets slightly large — not meaningful alone.',
    };

    const attn = data.filter(d => d.status !== 'good')
      .sort((a,b) => (a.status==='out'?0:1) - (b.status==='out'?0:1))
      .map(d => { const e = this.enrich(d, locked); e.reason = reason[d.name] || ''; return e; });

    const byPanel = {}; data.forEach(d => { (byPanel[d.panel] = byPanel[d.panel] || []).push(d); });
    const panels = order.map(p => {

      const worst = items.some(i => i.status==='out') ? 'out' : items.some(i => i.status==='watch') ? 'watch' : 'good';

        metrics: items.map(d => this.enrich(d, locked)),
      };
    });

    const plan = [
      {rank:'1',rankColor:'var(--out)',tag:'Do this first · clearly low',title:'Raise your Vitamin D (13.86 → aim 30+)',items:[
        'Your one genuinely low result and the easiest to fix. Ask your doctor about a correction course — often a weekly high-dose sachet for 6–8 weeks, then a daily maintenance dose.',
        'Get 15–20 min of midday sun on arms and face several days a week.',
        'Food helpers: fatty fish, egg yolk, fortified milk — though diet alone rarely fixes a level this low.',
        'Recheck in about 12 weeks, which the report itself recommends.']},
      {rank:'2',rankColor:'var(--watch)',tag:'Get it looked at · clearly high',title:'Investigate the raised IgE (877)',items:[
        'A level this high usually points to an allergic tendency (hay-fever, eczema, asthma) or occasionally a skin or parasitic cause.',
        'Bring it to your doctor. With symptoms like sneezing, itching or wheeze, a specific allergen panel is the logical next step.',
        'No self-treatment needed — this is a flag for a clinician, not an emergency.']},
      {rank:'3',rankColor:'var(--teal)',tag:'Prevention · trending toward the edge',title:'Nudge HbA1c and LDL down together',items:[
        'HbA1c is at the top of normal and LDL/non-HDL are just past optimal — the same habits move all three.',
        'Add 150 min a week of activity, trim refined carbs and sugary drinks, lean on fibre, nuts and unsaturated fats.',
        'Your HDL is high and triglycerides low — a strong base already. Re-test at your next annual check.']},
      {rank:'4',rankColor:'var(--ink-soft)',tag:'Note only · no action',title:'Leave the near-misses alone',items:[
        'TIBC, MPV and direct bilirubin each sit a hair outside their line, with neighbouring results normal. Let your doctor glance at them and re-check next routine panel.']},
    ];

    const reps = [...st.reports].sort((a,b) => a.date.localeCompare(b.date));
    const dLabel = iso => { const d = new Date(iso+'T00:00'); return d.toLocaleDateString(undefined, {day:'numeric', month:'short', year:'numeric'}); };

    return {
      isSignin: st.screen==='signin', isUpload: st.screen==='upload', isDashboard: st.screen==='dashboard',
      dzBorder: st.dragOver ? 'var(--teal)' : 'var(--line)', dzBg: st.dragOver ? '#E3F3EC' : 'var(--surface)',
      parseMsg: st.parseMsg,
      parseInfo: active ? `Showing ${parsedCount} marker${parsedCount===1?'':'s'} read from “${active.label}” (${dLabel(active.date)}). Markers not found in your report fall back to sample values.` : '',
      userEmail: st.user ? st.user.email : '',
      hasReports: reps.length>0, reportCount: reps.length,
      reportCountLabel: reps.length+' report'+(reps.length===1?'':'s')+' loaded',
      reports: reps.map(r => ({label:r.label, dateLabel:dLabel(r.date), sourceLabel: r.source==='upload'?' · uploaded':' · sample'})),
      trends: this.buildTrends(),
      attn, plan, panels,
      locked, planItemFilter: locked ? 'blur(5px)' : 'none', unlocked: !locked,
      calBtnLabel: ({idle:'Send tasks to Google Calendar', working:'Adding to Google Calendar…', done:'Added to your Google Calendar ✓', error:'Couldn’t add — tap to retry'})[st.calStatus] || 'Send tasks to Google Calendar',
      calBtnColor: st.calStatus==='done' ? 'var(--good)' : 'var(--teal)',
      showPaywall: st.showPaywall, paying: st.paying,
      payBtnBg: st.paying ? '#0a5e51' : 'var(--teal)',
      payBtnLabel: st.paying ? 'Processing…' : 'Pay ₹99 and unlock',
      stripeKeyNote: st.stripePk ? ' · '+st.stripePk.slice(0,10)+'…' : '',
      showConfig: st.showConfig, googleClientId: st.googleClientId, stripePk: st.stripePk,
    };
  }
